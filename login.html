<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>       
</head>
<body>
    <h2>User Login</h2>
    <input type="text" name="Email" id="Email ID" placeholder="Email ID"></input>
    <input type="password" name="Password" id="Password" placeholder="Password"></input>
    <button id="Log in">Log in</button>
    <button id="Forgot Password">Forgot Username/Password</button>
<style>
    body {
        width: 300px;
        height: 300px;
        border: 1px solid black;
        text-align: center;
        border-radius: 10px;
        margin: 0 auto;
    }
    input {
        display: block;
        margin: 10px auto;
        width: 200px;
        height: 30px;
        border-radius: 10px;
    }
    button {
        display: block;
        margin: 10px auto;
        width: 200px;
        height: 30px;
        border-radius: 10px;
        background-color: rgb(5, 181, 5);
        color: white;
        border: none;
        hover: {
            font-size: 20px;
        }
    }
    
</style>
    
</body>
</html>
